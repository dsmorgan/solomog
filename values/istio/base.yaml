# Base istiod values shared across all scenarios.
# Per-scenario overrides live in ambient/values.yaml and sidecar/values.yaml.

global:
  # Single-cluster defaults. Community multi-cluster (mesh.sh) overlays
  # global.network + global.multiCluster.clusterName from SOLO_NETWORK / SOLO_CLUSTER
  # in helmfiles/products/istio.yaml.gotmpl — do not hardcode cluster-one here for mesh.
  meshID: mesh1
  network: network1
  multiCluster:
    clusterName: cluster-one

pilot:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# Disable telemetry addons — use Gloo Mesh UI or Prometheus operator instead
telemetry:
  enabled: true
  v2:
    enabled: true
