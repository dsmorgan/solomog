# vcluster config for 2-cluster scenarios.
# Each cluster gets its own instance of this config with unique CIDRs.
# __CLUSTER_NAME__, __POD_CIDR__, __SVC_CIDR__ are replaced by vind-create.sh at runtime.

controlPlane:
  distro:
    k3s:
      enabled: true
      extraArgs:
        - "--cluster-cidr=__POD_CIDR__"
        - "--service-cidr=__SVC_CIDR__"
  coredns:
    enabled: true

sync:
  toHost:
    pods:
      enabled: true
    services:
      enabled: true
    configMaps:
      enabled: true
    secrets:
      enabled: true
    ingresses:
      enabled: true
    serviceAccounts:
      enabled: true
  fromHost:
    nodes:
      enabled: true
      selector:
        all: true

# Label the vcluster with its name so Istio multicluster can identify it
experimental:
  genericSync:
    config: |
      version: v1beta1
      export: []
      import: []
