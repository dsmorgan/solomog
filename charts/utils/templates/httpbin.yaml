apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin
  namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
        version: v1
    spec:
      serviceAccountName: httpbin
      containers:
        - name: httpbin
          # go reimplementation — multi-arch (incl. arm64/Apple Silicon).
          # The original kennethreitz/httpbin is amd64-only and crashes on arm64
          # nodes with "exec format error". go-httpbin listens on 8080.
          image: docker.io/mccutchen/go-httpbin:2.23.1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: httpbin
  ports:
    - name: http
      port: 80
      targetPort: 8080
