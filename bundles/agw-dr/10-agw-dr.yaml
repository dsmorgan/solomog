apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: healthz
  namespace: agentgateway-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agw
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: Exact
            value: /healthz
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: healthz
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: healthz
  traffic:
    directResponse:
      body: '{"status":"ok"}'
      status: 200
