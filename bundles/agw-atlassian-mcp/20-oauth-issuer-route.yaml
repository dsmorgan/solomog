# Expose the controller's eager-auth OAuth endpoints (/oauth-issuer/register, /authorize, /token,
# /callback/{downstream,upstream}) by routing the /oauth-issuer prefix to the enterprise-agentgateway
# controller Service on :7777 (where KGW_OAUTH_ISSUER_CONFIG stands up the AS + STS server).
# Workshop labs/mcp/mcp-eager-auth-okta.md Step 6. Route + backend are both in agentgateway-system,
# so no ReferenceGrant. No listener hostname — expose's `agw` gateway accepts any host.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth-issuer
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth-issuer
      backendRefs:
        - name: enterprise-agentgateway
          namespace: agentgateway-system
          port: 7777
