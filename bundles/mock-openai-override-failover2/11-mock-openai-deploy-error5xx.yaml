apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-gpt-4o-500
  namespace: mock-openai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-gpt-4o-500
  template:
    metadata:
      labels:
        app: mock-gpt-4o-500
    spec:
      containers:
      - args:
        - --model
        - mock-gpt-4o-500
        - --port
        - "8000"
        - --max-loras
        - "2"
        - --lora-modules
        - '{"name": "food-review-1"}'
        # Failure Injection - 100% rate limit errors
        - --failure-injection-rate
        - "100"
        - --failure-types
        - "server_error"
        image: ghcr.io/llm-d/llm-d-inference-sim:latest
        imagePullPolicy: IfNotPresent
        name: vllm-sim
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
