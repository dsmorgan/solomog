# /obo/anthropic → real Anthropic backend. Same shape as bundles/llmroute/20-anthropic-*.yaml
# but on the /obo/ prefix and protected by the OBO JWT policy (74), like the other OBO routes.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obo-anthropic
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agw
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /obo/anthropic
      backendRefs:
        - name: obo-anthropic
          group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
      timeouts:
        request: "120s"
