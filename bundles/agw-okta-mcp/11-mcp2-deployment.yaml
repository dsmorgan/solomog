apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp2-server
  namespace: mcp
spec:
  selector:
    matchLabels:
      app: mcp2-server
  template:
    metadata:
      labels:
        app: mcp2-server
    spec:
      containers:
        - name: mcp2-server
          image: node:20-alpine
          command:
            - sh
            - -c
            - |
              export NODE_OPTIONS="--max-old-space-size=10240 --max-semi-space-size=64"
              npx -y @modelcontextprotocol/server-everything streamableHttp
          ports:
            - name: mcp-http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
