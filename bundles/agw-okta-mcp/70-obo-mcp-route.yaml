# A SECOND route to the same MCP backend, at /obo/mcp — this one demands an STS-issued OBO
# token (policy 72), whereas /mcp (40) demands a raw Okta token (policy from 50). Same tool,
# two identity models side by side: edge validation vs on-behalf-of delegation.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: obo-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /obo/mcp
      backendRefs:
      - name: mcp-backend
        group: enterpriseagentgateway.solo.io
        kind: EnterpriseAgentgatewayBackend
