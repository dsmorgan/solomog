# The agent's identity for delegation. Its k8s SA token is the actor_token in the STS
# exchange, and its identity (system:serviceaccount:agentgateway-system:obo-agent, iss
# https://kubernetes.default.svc.cluster.local) is what the user token's may_act claim must
# authorize — see the README "Delegation" section for the exact Okta may_act value.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: obo-agent
  namespace: agentgateway-system
