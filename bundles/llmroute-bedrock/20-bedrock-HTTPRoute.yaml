# Path-per-model routing to the bedrock backends. parentRef is the solomog gateway `agw`
# (the workshop uses `agentgateway-proxy`; solomog names it `agw` — see expose). Specific
# /bedrock/<model> prefixes first; bare /bedrock (Exact) is the catch-all → mistral.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bedrock
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agw
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /bedrock/haiku
      backendRefs:
        - name: bedrock-haiku
          group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
      timeouts:
        request: "120s"
    - matches:
        - path:
            type: PathPrefix
            value: /bedrock/mistral
      backendRefs:
        - name: bedrock-mistral
          group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
      timeouts:
        request: "120s"
    - matches:
        - path:
            type: PathPrefix
            value: /bedrock/llama3-8b
      backendRefs:
        - name: bedrock-llama3-8b
          group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
      timeouts:
        request: "120s"
    - matches:                              # Default (bare /bedrock) → mistral
        - path:
            type: Exact
            value: /bedrock
      backendRefs:
        - name: bedrock-mistral
          group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
      timeouts:
        request: "120s"
