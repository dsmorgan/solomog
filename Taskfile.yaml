version: '3'

dotenv: ['.env', 'versions.env']

vars:
  # Override with EDITION=community to use upstream OSS charts (no license key needed)
  EDITION: '{{.EDITION | default "enterprise"}}'

# CLUSTER and CLUSTERS are interchangeable aliases everywhere:
#   - single-cluster tasks take the first name from whichever is set
#   - multi-cluster tasks take the full space-separated list from whichever is set
# So `CLUSTERS=foo` on a single task and `CLUSTER="a b"` on a multi task both work.

tasks:

  # ─── Meta ─────────────────────────────────────────────────────────────────

  default:
    desc: List all available scenarios
    cmds: [bash scripts/list.sh]
    silent: true

  setup:
    desc: Install prerequisites via Homebrew and create the solomog symlink
    cmds: [bash scripts/setup.sh]

  versions:update:
    desc: "Check pinned versions against GitHub latest (read-only — does not write versions.env)"
    cmds: [bash scripts/versions-update.sh]

  versions:show:
    desc: Show currently pinned product versions
    cmds: [cat versions.env]
    silent: true

  routes:
    desc: "Show the routing config on a cluster's agentgateway(s): routes, host/path, backends, policies, active status. CLUSTER=<name> [WIDE=true]"
    summary: |
      A brief, read-only view of the routing config on a cluster's agentgateway(s):
      each Gateway → its listeners → the HTTPRoutes attached to it (host/path →
      backend, which policies attach, and whether each route/gateway is actually
      ACTIVE per its .status conditions). Built from kubectl only — so unlike the
      proxy's config_dump / agctl, it also surfaces routes that AREN'T active
      (Accepted / ResolvedRefs / Programmed = False). Cluster-scoped, read-only;
      changes nothing. Scope is agentgateway today (auto-detected).

      Variables:
        CLUSTER   cluster to inspect (context vcluster-docker_<CLUSTER>)   default cluster-one
        WIDE      true to also show per-rule matchers/filters and the failure
                  reason for any non-active route                          default false

      Examples:
        solomog routes CLUSTER=a8
        solomog routes CLUSTER=a8 WIDE=true
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      WIDE: '{{if eq (.WIDE | default "") "true"}}wide{{end}}'
    cmds:
      - bash scripts/routes.sh {{.CLUSTER}} {{.WIDE}}
    env:
      # CONTEXT override: inspect an existing external context (EKS) instead of vind.
      # Empty → vind default vcluster-docker_<cluster>. See scripts/lib/target.sh.
      CONTEXT: '{{.CONTEXT | default ""}}'
    silent: true

  # ─── Stack — compose any products on a single cluster ─────────────────────
  # The general-purpose entry point. Installs any combination of products onto
  # one cluster, in dependency order. Single-product tasks below are shortcuts.

  stack:
    desc: 'Compose products on one cluster: PRODUCTS="istio kgateway" CLUSTER=cluster-one'
    summary: |
      Create a cluster and install any combination of products onto it, in dependency
      order (istio → gloo-mesh → kgateway → gloo-gateway → agentgateway), regardless of
      the order you list them. Generates Istio certs first when a mesh product is requested.

      Variables:
        PRODUCTS     space-separated products to install (REQUIRED)   istio | gloo-mesh | kgateway | gloo-gateway | agentgateway
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)  default cluster-one
        EDITION      enterprise | community                           default enterprise
        ISTIO_MODE   ambient | sidecar (only affects istio)           default ambient
        TOKEN_EXCHANGE   true to enable the agentgateway STS (only if PRODUCTS includes
                         agentgateway); also restarts the agw proxy. CLI-only, default false.
        TOKEN_EXCHANGE_JWKS_URL / _API_VALIDATOR   see .env.example

      Examples:
        solomog stack PRODUCTS="agentgateway" CLUSTER=aaa
        solomog stack PRODUCTS="istio kgateway" CLUSTER=aaa ISTIO_MODE=sidecar
        solomog stack PRODUCTS="kgateway" EDITION=community CLUSTER=aaa
        solomog stack PRODUCTS="agentgateway" CLUSTER=aaa TOKEN_EXCHANGE=true
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      PRODUCTS: '{{.PRODUCTS}}'
      ISTIO_MODE: '{{.ISTIO_MODE | default "ambient"}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} {{.PRODUCTS}}
    env:
      EDITION: '{{.EDITION}}'
      # CONTEXT override: install onto an existing external context (EKS) instead of vind.
      # Empty → vind default vcluster-docker_<cluster>. See scripts/lib/target.sh.
      CONTEXT: '{{.CONTEXT | default ""}}'
      ISTIO_MODE: '{{.ISTIO_MODE}}'
      # TOKEN_EXCHANGE is CLI-only — no .env fallback — so it can never silently leak
      # into an unrelated cluster's install. See .env.example for why.
      TOKEN_EXCHANGE: '{{.TOKEN_EXCHANGE | default "false"}}'
      TOKEN_EXCHANGE_JWKS_URL: '{{.TOKEN_EXCHANGE_JWKS_URL | default (env "TOKEN_EXCHANGE_JWKS_URL") | default ""}}'
      TOKEN_EXCHANGE_API_VALIDATOR: '{{.TOKEN_EXCHANGE_API_VALIDATOR | default (env "TOKEN_EXCHANGE_API_VALIDATOR") | default ""}}'
      TOKEN_EXCHANGE_API_VALIDATOR_URL: '{{.TOKEN_EXCHANGE_API_VALIDATOR_URL | default (env "TOKEN_EXCHANGE_API_VALIDATOR_URL") | default ""}}'
      TOKEN_EXCHANGE_ELICITATION_SECRET: '{{.TOKEN_EXCHANGE_ELICITATION_SECRET | default (env "TOKEN_EXCHANGE_ELICITATION_SECRET") | default ""}}'
      # Cluster-specific: defaults to the cluster's Solo UI host so it tracks CLUSTER (like
      # OAUTH_ISSUER_HOST). Override in .env only for a non-default gateway/host. Inert unless
      # TOKEN_EXCHANGE=true. Blank .env value → this derived default applies.
      TOKEN_EXCHANGE_CALLBACK_URL: '{{.TOKEN_EXCHANGE_CALLBACK_URL | default (env "TOKEN_EXCHANGE_CALLBACK_URL") | default (printf "https://ui.agw.%s.test/age/elicitations" (.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first))}}'
      OAUTH_ISSUER: '{{.OAUTH_ISSUER | default "false"}}'
      OAUTH_ISSUER_HOST: '{{.OAUTH_ISSUER_HOST | default (printf "agw.%s.test" (.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first))}}'
    preconditions:
      - sh: '[ -n "{{.PRODUCTS}}" ]'
        msg: 'Specify products, e.g. PRODUCTS="istio kgateway agentgateway"'

  # ─── Istio — single cluster ───────────────────────────────────────────────

  istio:ambient:single:
    desc: "1 cluster · Istio ambient mode · EDITION={{.EDITION}}"
    summary: |
      Install Istio in ambient mode on one cluster. Shortcut for:
      stack PRODUCTS="istio" ISTIO_MODE=ambient (mode is fixed by this task —
      use istio:sidecar:single for sidecar).

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION   enterprise | community                            default enterprise

      See `solomog help stack` for the full product-install reference.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} istio
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:single:
    desc: "1 cluster · Istio sidecar mode · EDITION={{.EDITION}}"
    summary: |
      Install Istio in sidecar mode on one cluster. Shortcut for:
      stack PRODUCTS="istio" ISTIO_MODE=sidecar (mode is fixed by this task —
      use istio:ambient:single for ambient).

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION   enterprise | community                            default enterprise

      See `solomog help stack` for the full product-install reference.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} istio
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  gloo-mesh:single:
    desc: "1 cluster · Istio + Gloo Mesh Enterprise mgmt plane · EDITION={{.EDITION}}"
    summary: |
      Install Istio + the Gloo Mesh Enterprise management plane on one cluster.
      Shortcut for: stack PRODUCTS="istio gloo-mesh".

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION      enterprise | community                            default enterprise
        ISTIO_MODE   ambient | sidecar                                 default ambient

      See `solomog help stack` for the full product-install reference.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} istio gloo-mesh
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: '{{.ISTIO_MODE | default "ambient"}}'

  # ─── Istio — multi-cluster mesh ───────────────────────────────────────────
  # mesh.sh installs the istio product module onto each cluster with a shared CA.
  # flat    → clusters share one network; whole-subnet pod routing via networking.sh.
  # gateway → per-cluster network; mesh-eastwest.sh exposes + links east-west gateways and
  #           networking.sh routes to the peer gateway IPs — the mesh comes up peered.
  # Host routing is ephemeral (Docker VM) — re-run `solomog net:repair CLUSTERS="…"` after a
  # Docker Desktop restart (the mesh itself survives; only the routing is lost).
  # Override the cluster names with CLUSTERS="a b" (or CLUSTER="a b").
  # 3-cluster scenarios support mixed Istio versions via versions.env overrides.

  istio:ambient:multi-flat:
    desc: "2 clusters · ambient · flat network · EDITION={{.EDITION}}"
    summary: |
      Build a 2-cluster ambient Istio mesh on a flat (shared) network — one root CA,
      flat pod routing (networking.sh) so clusters reach each other directly. Host
      routing is ephemeral; re-run `solomog net:repair` after a Docker restart.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two"
        EDITION    enterprise | community          default enterprise

      Mode (ambient) and topology (flat) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two"}}'
    cmds:
      - bash scripts/mesh.sh flat {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-flat:
    desc: "2 clusters · sidecar · flat network · EDITION={{.EDITION}}"
    summary: |
      Build a 2-cluster sidecar Istio mesh on a flat (shared) network — one root CA,
      flat pod routing (networking.sh) so clusters reach each other directly. Host
      routing is ephemeral; re-run `solomog net:repair` after a Docker restart.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two"
        EDITION    enterprise | community          default enterprise

      Mode (sidecar) and topology (flat) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two"}}'
    cmds:
      - bash scripts/mesh.sh flat {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  istio:ambient:multi-gateway:
    desc: "2 clusters · ambient · multi-network (east-west) · EDITION={{.EDITION}}"
    summary: |
      Build a 2-cluster ambient Istio mesh on separate networks (east-west gateway
      topology): per-cluster networks, one shared root CA, east-west gateways exposed
      and linked, and host routing to the peer gateway IPs — comes up peered, no manual
      steps. Host routing is ephemeral; re-run `solomog net:repair` after a Docker restart.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two"
        EDITION    enterprise | community          default enterprise

      Mode (ambient) and topology (gateway) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two"}}'
    cmds:
      - bash scripts/mesh.sh gateway {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-gateway:
    desc: "2 clusters · sidecar · multi-network (east-west) · EDITION={{.EDITION}}"
    summary: |
      Build a 2-cluster sidecar Istio mesh on separate networks (east-west gateway
      topology): per-cluster networks, one shared root CA, east-west gateways exposed
      and linked, and host routing to the peer gateway IPs — comes up peered, no manual
      steps. Host routing is ephemeral; re-run `solomog net:repair` after a Docker restart.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two"
        EDITION    enterprise | community          default enterprise

      Mode (sidecar) and topology (gateway) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two"}}'
    cmds:
      - bash scripts/mesh.sh gateway {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  istio:ambient:multi-3:
    desc: "3 clusters · ambient · flat network · EDITION={{.EDITION}}"
    summary: |
      Build a 3-cluster ambient Istio mesh on a flat (shared) network — one root CA
      across all three, flat pod routing. Per-cluster Istio version overrides
      (ISTIO_VERSION_CLUSTER_TWO/THREE in versions.env) enable mixed-version meshes.
      Host routing is ephemeral; re-run `solomog net:repair` after a Docker restart.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two cluster-three"
        EDITION    enterprise | community          default enterprise

      Mode (ambient) and topology (flat) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two cluster-three"}}'
    cmds:
      - bash scripts/mesh.sh flat {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-3:
    desc: "3 clusters · sidecar · flat network · EDITION={{.EDITION}}"
    summary: |
      Build a 3-cluster sidecar Istio mesh on a flat (shared) network — one root CA
      across all three, flat pod routing. Per-cluster Istio version overrides
      (ISTIO_VERSION_CLUSTER_TWO/THREE in versions.env) enable mixed-version meshes.
      Host routing is ephemeral; re-run `solomog net:repair` after a Docker restart.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two cluster-three"
        EDITION    enterprise | community          default enterprise

      Mode (sidecar) and topology (flat) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two cluster-three"}}'
    cmds:
      - bash scripts/mesh.sh flat {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  istio:ambient:multi-3-gateway:
    desc: "3 clusters · ambient · multi-network (east-west) · EDITION={{.EDITION}}"
    summary: |
      Build a 3-cluster ambient Istio mesh on separate networks (east-west gateway topology):
      per-cluster networks, one shared root CA, east-west gateways exposed and linked in a FULL
      mesh (every cluster ↔ every other), and host routing to the peer gateway IPs — comes up
      peered, no manual steps. Host routing is ephemeral; re-run `solomog net:repair` after a
      Docker restart. Per-cluster Istio version overrides (versions.env) enable mixed versions.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two cluster-three"
        EDITION    enterprise | community          default enterprise

      Mode (ambient) and topology (gateway) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two cluster-three"}}'
    cmds:
      - bash scripts/mesh.sh gateway {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-3-gateway:
    desc: "3 clusters · sidecar · multi-network (east-west) · EDITION={{.EDITION}}"
    summary: |
      Build a 3-cluster sidecar Istio mesh on separate networks (east-west gateway topology):
      per-cluster networks, one shared root CA, east-west gateways exposed and linked in a FULL
      mesh (every cluster ↔ every other), and host routing to the peer gateway IPs — comes up
      peered, no manual steps. Host routing is ephemeral; re-run `solomog net:repair` after a
      Docker restart. Per-cluster Istio version overrides (versions.env) enable mixed versions.

      Variables:
        CLUSTERS   space-separated cluster names   default "cluster-one cluster-two cluster-three"
        EDITION    enterprise | community          default enterprise

      Mode (sidecar) and topology (gateway) are fixed by this task.
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default "cluster-one cluster-two cluster-three"}}'
    cmds:
      - bash scripts/mesh.sh gateway {{.CLUSTERS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  net:repair:
    desc: "Re-apply inter-cluster Docker routing after a Docker Desktop restart (mesh survives; only routing is lost)."
    summary: |
      A Docker Desktop restart wipes the host-level routing between vcluster networks (it lives in
      the Docker VM), silently disconnecting a multi-cluster mesh — the clusters, Istio, gateways,
      and certs all survive. This re-applies just the routing, so recovery is cheap (no full task
      re-run). No stored state: bridges derive from the cluster names, and topology (flat vs
      gateway) is auto-detected from the live clusters.

      Variables:
        CLUSTERS   space-separated cluster names in the mesh (alias CLUSTER)   required

      Example:
        solomog net:repair CLUSTERS="ia1 ia2"
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default ""}}'
    cmds:
      - bash scripts/run.sh "Repair mesh routing → {{.CLUSTERS}}" bash scripts/net-repair.sh {{.CLUSTERS}}

  # ─── kgateway ────────────────────────────────────────────────────────────

  kgateway:
    desc: "1 cluster · kgateway standalone · EDITION={{.EDITION}}"
    summary: |
      Install kgateway on one cluster. Shortcut for: stack PRODUCTS="kgateway".

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION   enterprise | community                            default enterprise

      See `solomog help stack` for the full product-install reference.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} kgateway
    env:
      EDITION: '{{.EDITION}}'

  kgateway:with-istio:
    desc: "1 cluster · kgateway + Istio sidecar · EDITION={{.EDITION}}"
    summary: |
      Install Istio (sidecar) + kgateway on one cluster. Shortcut for:
      stack PRODUCTS="istio kgateway" ISTIO_MODE=sidecar (mode fixed by this task).

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION   enterprise | community                            default enterprise

      See `solomog help stack` for the full product-install reference.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} istio kgateway
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  # ─── Gloo Gateway (distinct from kgateway) ────────────────────────────────

  gloo-gateway:
    desc: "1 cluster · Gloo Gateway 1.21.x · EDITION={{.EDITION}}"
    summary: |
      Install Gloo Gateway (gloo-ee 1.21.x) on one cluster. Shortcut for:
      stack PRODUCTS="gloo-gateway". A distinct product from kgateway.

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION   enterprise | community                            default enterprise

      See `solomog help stack` for the full product-install reference.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} gloo-gateway
    env:
      EDITION: '{{.EDITION}}'

  # ─── agentgateway ────────────────────────────────────────────────────────

  agentgateway:
    desc: "1 cluster · agentgateway · EDITION={{.EDITION}}"
    summary: |
      Install agentgateway on one cluster. Shortcut for: stack PRODUCTS="agentgateway".

      Variables:
        CLUSTER          cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        EDITION          enterprise | community                            default enterprise
        TOKEN_EXCHANGE   true to enable the OBO token-exchange STS (and restart the agw
                         proxy). CLI-only — no .env fallback. default false.
        TOKEN_EXCHANGE_JWKS_URL / _API_VALIDATOR   see .env.example
        OAUTH_ISSUER     true to enable the eager-auth OAuth issuer (gateway acts as the
                         OAuth AS at /oauth-issuer, brokers to Okta). Needs TOKEN_EXCHANGE=true
                         + OKTA_* in .env. CLI-only. default false.
        OAUTH_ISSUER_HOST   public gateway host for the issuer base_url.
                            default agw.<cluster>.test

      Related: `agentgateway:ui` adds the Solo UI. See `solomog help stack`.

      Examples:
        solomog agentgateway CLUSTER=aaa
        solomog agentgateway CLUSTER=aaa TOKEN_EXCHANGE=true
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} agentgateway
    env:
      EDITION: '{{.EDITION}}'
      # CONTEXT override: set to an existing kube context (e.g. EKS) to install onto it
      # instead of a vind cluster. Empty → vind default vcluster-docker_<cluster>. See lib/target.sh.
      CONTEXT: '{{.CONTEXT | default ""}}'
      TOKEN_EXCHANGE: '{{.TOKEN_EXCHANGE | default "false"}}'
      TOKEN_EXCHANGE_JWKS_URL: '{{.TOKEN_EXCHANGE_JWKS_URL | default (env "TOKEN_EXCHANGE_JWKS_URL") | default ""}}'
      TOKEN_EXCHANGE_API_VALIDATOR: '{{.TOKEN_EXCHANGE_API_VALIDATOR | default (env "TOKEN_EXCHANGE_API_VALIDATOR") | default ""}}'
      TOKEN_EXCHANGE_API_VALIDATOR_URL: '{{.TOKEN_EXCHANGE_API_VALIDATOR_URL | default (env "TOKEN_EXCHANGE_API_VALIDATOR_URL") | default ""}}'
      TOKEN_EXCHANGE_ELICITATION_SECRET: '{{.TOKEN_EXCHANGE_ELICITATION_SECRET | default (env "TOKEN_EXCHANGE_ELICITATION_SECRET") | default ""}}'
      # Cluster-specific: defaults to the cluster's Solo UI host so it tracks CLUSTER (like
      # OAUTH_ISSUER_HOST). Override in .env only for a non-default gateway/host. Inert unless
      # TOKEN_EXCHANGE=true. Blank .env value → this derived default applies.
      TOKEN_EXCHANGE_CALLBACK_URL: '{{.TOKEN_EXCHANGE_CALLBACK_URL | default (env "TOKEN_EXCHANGE_CALLBACK_URL") | default (printf "https://ui.agw.%s.test/age/elicitations" (.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first))}}'
      OAUTH_ISSUER: '{{.OAUTH_ISSUER | default "false"}}'
      OAUTH_ISSUER_HOST: '{{.OAUTH_ISSUER_HOST | default (printf "agw.%s.test" .CLUSTER)}}'

  agentgateway:ui:
    desc: "1 cluster · agentgateway + Solo UI (management chart) · enterprise only. Route the UI with expose ROUTE=true."
    summary: |
      Install agentgateway, then the Solo UI (management chart) on top. Enterprise only
      (community is rejected). With ROUTE=true, also routes the UI at ui.<gw>.<cluster>.test.

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        ROUTE        true | false — route the UI on a sub-host          default false
        GATEWAY      gateway to target for tracing + routing            default agw
        GATEWAY_NS   gateway namespace                                  default agentgateway-system
        EDITION      enterprise (community is rejected — no community UI)
        TOKEN_EXCHANGE   true to enable the OBO token-exchange STS (and restart the agw
                         proxy). CLI-only — no .env fallback. default false.
        TOKEN_EXCHANGE_JWKS_URL / _API_VALIDATOR   see .env.example
        OAUTH_ISSUER     true to enable the eager-auth OAuth issuer (gateway acts as the
                         OAuth AS at /oauth-issuer, brokers to Okta). Needs TOKEN_EXCHANGE=true
                         + OKTA_* in .env. CLI-only. default false.
        OAUTH_ISSUER_HOST   public gateway host for the issuer base_url.
                            default agw.<cluster>.test

      Examples:
        solomog agentgateway:ui CLUSTER=aaa
        solomog agentgateway:ui expose ROUTE=true CLUSTER=aaa
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} agentgateway
      - bash scripts/run.sh "Install agentgateway UI → {{.CLUSTER}}" bash scripts/install-agentgateway-ui.sh vcluster-docker_{{.CLUSTER}}
    env:
      EDITION: '{{.EDITION}}'
      ROUTE: '{{.ROUTE | default "false"}}'
      GATEWAY: '{{.GATEWAY | default "agw"}}'
      TOKEN_EXCHANGE: '{{.TOKEN_EXCHANGE | default "false"}}'
      TOKEN_EXCHANGE_JWKS_URL: '{{.TOKEN_EXCHANGE_JWKS_URL | default (env "TOKEN_EXCHANGE_JWKS_URL") | default ""}}'
      TOKEN_EXCHANGE_API_VALIDATOR: '{{.TOKEN_EXCHANGE_API_VALIDATOR | default (env "TOKEN_EXCHANGE_API_VALIDATOR") | default ""}}'
      TOKEN_EXCHANGE_API_VALIDATOR_URL: '{{.TOKEN_EXCHANGE_API_VALIDATOR_URL | default (env "TOKEN_EXCHANGE_API_VALIDATOR_URL") | default ""}}'
      TOKEN_EXCHANGE_ELICITATION_SECRET: '{{.TOKEN_EXCHANGE_ELICITATION_SECRET | default (env "TOKEN_EXCHANGE_ELICITATION_SECRET") | default ""}}'
      # Cluster-specific: defaults to the cluster's Solo UI host so it tracks CLUSTER (like
      # OAUTH_ISSUER_HOST). Override in .env only for a non-default gateway/host. Inert unless
      # TOKEN_EXCHANGE=true. Blank .env value → this derived default applies.
      TOKEN_EXCHANGE_CALLBACK_URL: '{{.TOKEN_EXCHANGE_CALLBACK_URL | default (env "TOKEN_EXCHANGE_CALLBACK_URL") | default (printf "https://ui.agw.%s.test/age/elicitations" (.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first))}}'
      OAUTH_ISSUER: '{{.OAUTH_ISSUER | default "false"}}'
      OAUTH_ISSUER_HOST: '{{.OAUTH_ISSUER_HOST | default (printf "agw.%s.test" .CLUSTER)}}'
      GATEWAY_NS: '{{.GATEWAY_NS | default ""}}'  # empty → script default agentgateway-system

  # ─── Gateway exposure (Gateway + TLS + DNS) ───────────────────────────────
  # Creates the Gateway and makes it reachable locally. Product-agnostic; defaults
  # target agentgateway (enterprise or community GatewayClass auto-resolved).

  expose:
    desc: "Create + expose a Gateway (TLS + /etc/hosts). Run 'solomog help expose' for options."
    summary: |
      Create a Gateway and make it reachable locally: mkcert TLS cert (HOST + *.HOST),
      the Gateway resource (HTTP + HTTPS listeners), and an /etc/hosts entry (needs sudo).
      CLASS is edition-aware: prefers the GatewayClass actually on the cluster
      (enterprise-agentgateway|agentgateway, enterprise-kgateway|kgateway).

      With CONTEXT set (external, e.g. EKS) it switches to the cloud path: a public
      LoadBalancer with a self-signed cert minted for the LB's resolved hostname, and
      NO /etc/hosts edit (the LB hostname is public DNS). The phase-4c agent trusts the
      mkcert CA, which is why self-signed is fine.

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        CONTEXT      external kube context (EKS); set → cloud path      default "" (vind)
        PRODUCT      agentgateway | kgateway                           auto-detected from GatewayClasses
        NAME         Gateway name                                      default per PRODUCT (agw / kgw)
        NAMESPACE    namespace                                         default per PRODUCT (agentgateway-system / kgateway-system)
        CLASS        gatewayClassName                                  default: detected (enterprise-* or community)
        HOST         TLS + DNS hostname                                default <NAME>.<CLUSTER>.test (vind) / resolved LB hostname (external)
        SECRET       TLS secret name                                   default <NAME>-tls
        HTTP_PORT    HTTP listener port                                default 8080
        HTTPS_PORT   HTTPS listener port                               default 443

      Examples:
        solomog expose CLUSTER=aaa
        solomog expose PRODUCT=kgateway CLUSTER=aaa
        solomog expose HTTP_PORT=9080 HTTPS_PORT=8443 CLUSTER=aaa
        solomog expose CONTEXT=arn:aws:eks:us-east-1:...:cluster/dmorgan-agw   # external EKS
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Expose gateway → {{.CLUSTER}}" bash scripts/expose.sh
    env:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      CONTEXT: '{{.CONTEXT | default ""}}'   # set → external (EKS): public LB + self-signed TLS, no /etc/hosts
      PRODUCT: '{{.PRODUCT | default ""}}'
      NAME: '{{.NAME | default ""}}'
      NAMESPACE: '{{.NAMESPACE | default ""}}'
      CLASS: '{{.CLASS | default ""}}'
      HOST: '{{.HOST | default ""}}'
      SECRET: '{{.SECRET | default ""}}'
      HTTP_PORT: '{{.HTTP_PORT | default ""}}'    # empty → expose.sh default 8080
      HTTPS_PORT: '{{.HTTPS_PORT | default ""}}'  # empty → expose.sh default 443

  # ─── Monitoring (cross-cutting add-on) ────────────────────────────────────
  # Prometheus + Grafana for any product. Auto-detects product dashboards (like
  # `expose` auto-detects the gateway). Route Grafana via expose ROUTE=true.

  monitoring:
    desc: "Install Prometheus + Grafana on CLUSTER; auto-detects product dashboards (DASHBOARDS=agentgateway|none). Route Grafana with expose ROUTE=true."
    summary: |
      Install Prometheus + Grafana (kube-prometheus-stack, OSS, edition-agnostic) on a
      cluster. Auto-detects products from GatewayClasses and layers on their dashboards.
      With ROUTE=true, routes Grafana at grafana.<gw>.<cluster>.test.

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        DASHBOARDS   auto | agentgateway | none                         default auto (detect)
        ROUTE        true | false — route Grafana on a sub-host         default false
        GATEWAY      gateway to route Grafana through                   default agw
        GATEWAY_NS   gateway namespace                                  default agentgateway-system

      Examples:
        solomog monitoring CLUSTER=aaa
        solomog monitoring expose ROUTE=true CLUSTER=aaa
        solomog monitoring DASHBOARDS=none CLUSTER=aaa
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Install monitoring → {{.CLUSTER}}" bash scripts/install-monitoring.sh vcluster-docker_{{.CLUSTER}}
    env:
      EDITION: '{{.EDITION}}'
      DASHBOARDS: '{{.DASHBOARDS | default "auto"}}'
      ROUTE: '{{.ROUTE | default "false"}}'
      GATEWAY: '{{.GATEWAY | default "agw"}}'
      GATEWAY_NS: '{{.GATEWAY_NS | default ""}}'  # empty → script default agentgateway-system

  # ─── Custom config bundles ────────────────────────────────────────────────
  # Apply a directory of bespoke manifests (customer repros) to a cluster, in
  # order. The escape hatch for config not worth generalizing into a product/app.

  apply:
    desc: "Apply custom bundle(s) (BUNDLE=<name> or BUNDLES=\"a b\") to CLUSTER in order. DRY_RUN=true to validate. See bundles:list."
    summary: |
      Apply a custom-config bundle (a directory of manifests under bundles/<name>/) to a
      cluster, in sorted order. .sh hooks run in place; .yaml.tmpl files render %%TOKEN%%
      placeholders. Idempotent (kubectl apply); never prunes.

      Variables:
        BUNDLE       bundle name(s) under bundles/ or bundles/private/ (REQUIRED)   see: solomog bundles:list
        BUNDLES      alias for BUNDLE; either may list several (space-separated), applied left-to-right
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)               default cluster-one
        DRY_RUN      true | false — server-side dry-run, writes nothing             default false
        GATEWAY      gateway name for %%GATEWAY%% / %%HOST%%                         auto-detected agw/kgw
        HOST         host for %%HOST%%                                              default <GATEWAY>.<CLUSTER>.test

      Examples:
        solomog apply BUNDLE=llmroute CLUSTER=aaa
        solomog apply BUNDLES="llmroute-vertex llmroute-bedrock" CLUSTER=aaa
        solomog apply BUNDLE=agw-dr CLUSTER=aaa DRY_RUN=true
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      # BUNDLE and BUNDLES are interchangeable (like CLUSTER/CLUSTERS); either may name
      # several bundles, applied left-to-right. apply-bundle.sh loops over the list.
      BUNDLES: '{{.BUNDLES | default .BUNDLE}}'
    cmds:
      - bash scripts/run.sh "Apply bundle(s) {{.BUNDLES}} → {{.CLUSTER}}" bash scripts/apply-bundle.sh
    env:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      # CONTEXT is an explicit override; unset → CLUSTER resolves via the registry (external,
      # e.g. EKS) or the vind default. See scripts/lib/target.sh.
      CONTEXT: '{{.CONTEXT | default ""}}'
      BUNDLE: '{{.BUNDLES}}'
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      GATEWAY: '{{.GATEWAY | default ""}}'   # empty → apply-bundle.sh auto-detects agw/kgw
      HOST: '{{.HOST | default ""}}'

  graph:
    desc: "Open an interactive graph of a cluster's agentgateway config in the browser: CLUSTER=<name>. OPEN=false to just write the HTML."
    summary: |
      Snapshot a cluster's agentgateway configuration and render it as an interactive,
      self-contained HTML graph in your browser: a top-down hierarchy rooted at the Gateway
      (data plane) → HTTPRoutes → Backends → Policies, with the control plane shown via the
      GatewayClass chain (Gateway → gatewayClassName → GatewayClass → controllerName →
      enterprise-agentgateway → manages → Gateway) and its proxy pod. Nodes are colour-coded by
      kind, and by plane (data / control / class) per the legend. A toggle shows/hides the
      auxiliary control-plane services. Click any node for its details and a copy-paste kubectl
      command. Same relationship model as `solomog routes`.

      The HTML is self-contained (graph lib + data inlined) — it works offline and can be
      handed off. By DEFAULT it just opens the file (the task then exits cleanly, nothing to
      stop). SERVE=true serves it on a local port instead (nicer clipboard support); stop
      that with Enter for a clean exit.

      Variables:
        CLUSTER   cluster to graph (context vcluster-docker_<CLUSTER>)   default cluster-one
        OPEN      true | false — open the file in a browser              default true
        SERVE     true — serve on a local port (Enter to stop) instead of opening the file
        OUT       output HTML path                default .solomog/graph/<cluster>-<ts>.html
        PORT      serve port (SERVE=true only)     default an ephemeral free port

      Examples:
        solomog graph CLUSTER=a10
        solomog graph CLUSTER=a10 OPEN=false
        solomog graph CLUSTER=a10 SERVE=true
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Graph agentgateway config → {{.CLUSTER}}" bash scripts/graph.sh {{.CLUSTER}}
    env:
      # CONTEXT override: graph an existing external context (EKS) instead of vind.
      # Empty → vind default vcluster-docker_<cluster>. See scripts/lib/target.sh.
      CONTEXT: '{{.CONTEXT | default ""}}'
      OPEN: '{{.OPEN | default "true"}}'
      SERVE: '{{.SERVE | default "false"}}'
      OUT: '{{.OUT | default ""}}'
      PORT: '{{.PORT | default ""}}'

  export:
    desc: "Export a bundle as a portable, secret-safe hand-off package: BUNDLE=<name> [OUT=… CLUSTER=… EDITION=…]. Stateless (no cluster)."
    summary: |
      Package a bundle's DECLARATIVE config (its .yaml / .yaml.tmpl) into a portable,
      secret-safe directory you can hand to someone NOT using solomog. Stateless — touches
      no cluster. Produces manifests/ (apply order preserved), env.example (vars the bundle
      needs, secrets flagged), PREREQUISITES.md (product/version/flags), install/values.yaml
      (resolved install values, best-effort), and README.md. A secret backstop scans the
      package for real .env values and redacts any that leak.

      Phase 1: .sh hooks are NOT executed — they're copied into manual-steps/ and listed in
      the README as explicit manual steps (so the package never looks complete when a hook's
      config isn't captured). Rendering + drift-verify against a live cluster come later.

      Variables:
        BUNDLE    bundle name to export (REQUIRED)                     see: solomog bundles:list
        OUT       output directory            default .solomog/exports/<bundle>-<timestamp>
        EDITION   enterprise | community       default enterprise      (for resolved install values)
        CLUSTER   value rendered for %%CLUSTER%% default "example"      (recipient substitutes)
        GATEWAY   value rendered for %%GATEWAY%% default agw
        HOST      value rendered for %%HOST%%    default <GATEWAY>.<CLUSTER>.test

      Examples:
        solomog export BUNDLE=agw-okta-mcp
        solomog export BUNDLE=llmroute OUT=~/handoff/llmroute
    cmds:
      - bash scripts/run.sh "Export bundle {{.BUNDLE}}" bash scripts/export-bundle.sh
    env:
      BUNDLE: '{{.BUNDLES | default .BUNDLE}}'
      OUT: '{{.OUT | default ""}}'
      EDITION: '{{.EDITION}}'
      CLUSTER: '{{.CLUSTER | default ""}}'
      GATEWAY: '{{.GATEWAY | default ""}}'
      HOST: '{{.HOST | default ""}}'

  bundles:list:
    desc: "List available custom-config bundles (bundles/ and bundles/private/)."
    cmds:
      - bash scripts/bundles.sh list

  bundles:show:
    desc: "Show a bundle's manifests in apply order: BUNDLE=<name> (alias BUNDLES)."
    summary: |
      Show a bundle's manifests in apply order, with [tmpl]/[exec] markers. Cluster-free
      (discovery only — does not apply anything).

      Variables:
        BUNDLE    bundle name to inspect (REQUIRED)   see: solomog bundles:list
        BUNDLES   alias for BUNDLE (same as apply/test/export)
    vars:
      BUNDLES: '{{.BUNDLES | default .BUNDLE}}'
    cmds:
      - bash scripts/bundles.sh show {{.BUNDLES}}

  test:
    desc: "Run bundle test(s) (BUNDLE=<name> or BUNDLES=\"a b\", tests/*.sh) against CLUSTER; captures results to .solomog/test-runs/."
    summary: |
      Run a bundle's tests (bundles/<name>/tests/*.sh) against a cluster, in sorted order.
      Each test inherits CONTEXT/CLUSTER/GATEWAY/HOST + .env; pass/fail is the exit code.
      Output is captured to .solomog/test-runs/<bundle>-<ts>/ (gitignored).

      Variables:
        BUNDLE       bundle name(s) whose tests/ to run (REQUIRED)         see: solomog bundles:list
        BUNDLES      alias for BUNDLE; either may list several, run in order
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)       default cluster-one
        GATEWAY      gateway name for the $HOST default                    auto-detected agw/kgw
        HOST         base host for curls in tests                          default <GATEWAY>.<CLUSTER>.test

      Examples:
        solomog test BUNDLE=llmroute-bedrock CLUSTER=aaa
        solomog test BUNDLES="llmroute-vertex llmroute-bbr" CLUSTER=aaa
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      # BUNDLE/BUNDLES interchangeable; either may name several bundles, tested in order.
      BUNDLES: '{{.BUNDLES | default .BUNDLE}}'
    cmds:
      - bash scripts/run.sh "Test bundle(s) {{.BUNDLES}} → {{.CLUSTER}}" bash scripts/test-bundle.sh
    env:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      # CONTEXT is an explicit override; unset → CLUSTER resolves via the registry (external)
      # or the vind default. See scripts/lib/target.sh.
      CONTEXT: '{{.CONTEXT | default ""}}'
      BUNDLE: '{{.BUNDLES}}'
      GATEWAY: '{{.GATEWAY | default ""}}'   # empty → test-bundle.sh auto-detects agw/kgw
      HOST: '{{.HOST | default ""}}'

  # ─── Credentials ──────────────────────────────────────────────────────────

  gcp:refresh:
    desc: "Refresh GCP_ACCESS_TOKEN in .env (~1h), then re-run your bundle. Run 'solomog help gcp:refresh' for details."
    summary: |
      Re-fetch a GCP access token (gcloud auth print-access-token) into .env as
      GCP_ACCESS_TOKEN. ONLY updates .env — re-run your bundle to push it into the cluster
      secret. The token is short-lived (~1h); re-run this when a GCP-backed backend 401s.

      No variables. Uses the active gcloud account. Chain with apply to push it:
        solomog gcp:refresh apply BUNDLE=llmroute-vertex CLUSTER=aaa
    cmds:
      - bash scripts/run.sh "Refresh GCP access token" bash scripts/gcp-refresh.sh

  aws:refresh:
    desc: "Refresh AWS creds in .env (SSO export-credentials; sso-login if stale). Re-run your bundle to apply. AWS_PROFILE/AWS_SSO_SESSION overridable."
    summary: |
      Export AWS SSO credentials (access key + secret + session token) into .env, running
      `aws sso login` first if the session is stale. ONLY updates .env — re-run your bundle
      to push them into the cluster secret. SSO creds are short-lived (<=12h); re-run when a
      Bedrock route 401/403s. One-time setup: `aws configure sso` (session SOlo).

      Variables (set in .env, not on the command line):
        AWS_PROFILE       SSO profile to export                       the one `aws configure sso` created
        AWS_SSO_SESSION   SSO session name for the login fallback     default SOlo

      Chain with apply to push them:
        solomog aws:refresh apply BUNDLE=llmroute-bedrock CLUSTER=aaa
    cmds:
      - bash scripts/run.sh "Refresh AWS credentials" bash scripts/aws-refresh.sh

  eks:create:
    desc: "Create an EKS cluster (eksctl --with-oidc) + register its kube context. CLUSTER=<name> required. Run 'solomog help eks:create'."
    summary: |
      Provision the EKS cluster for the agentgateway EKS tier: `eksctl create cluster --with-oidc`
      then `aws eks update-kubeconfig`, printing the kube CONTEXT to thread through the rest of the
      flow (agentgateway → expose → apply → eks:irsa). Idempotent (skips create if the cluster
      exists). Provisions REAL infra (~15-20 min, costs $). `--with-oidc` sets up the IAM OIDC
      provider that eks:irsa needs.

      Needs aws creds IN THE SHELL (export AWS_PROFILE + eval export-credentials) + eksctl.

      Variables:
        CLUSTER        EKS cluster NAME (required — no default; this makes a real cluster)
        AWS_REGION     region                          default us-east-1
        EKS_VERSION    Kubernetes version              default 1.31
        EKS_NODES      managed node count              default 2
        EKS_NODE_TYPE  instance type                   default m5.large

      Example:
        export AWS_PROFILE=AdministratorAccess-170015905430
        eval "$(aws configure export-credentials --format env)"
        solomog eks:create CLUSTER=dmorgan-agw
    cmds:
      - bash scripts/run.sh "Create EKS cluster {{.CLUSTER}}" bash scripts/eks-create.sh
    env:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default ""}}'
      AWS_REGION: '{{.AWS_REGION | default ""}}'
      EKS_VERSION: '{{.EKS_VERSION | default ""}}'
      EKS_NODES: '{{.EKS_NODES | default ""}}'
      EKS_NODE_TYPE: '{{.EKS_NODE_TYPE | default ""}}'

  eks:delete:
    desc: "Tear down an EKS cluster safely (delete Gateway/LB svcs first → eksctl delete → deregister). CLUSTER=<name> required. Run 'solomog help eks:delete'."
    summary: |
      Safely delete an EKS cluster solomog installed onto — the complement to eks:create. Deletes
      the Gateways + LoadBalancer Services FIRST so AWS drops the ELBs (whose ENIs would otherwise
      pin the subnets and fail the VPC delete → orphaned VPC → burned VPC-quota slot), waits for
      them to drain, then `eksctl delete cluster`, then deregisters from .solomog/contexts. Also
      self-heals orphans: deletes any LB left in the VPC, and if the control plane is already gone
      deletes the eksctl-<name>-* CloudFormation stacks directly (disabling termination protection).
      MUTATES AWS. EKS only.

      Needs aws creds IN THE SHELL (export AWS_PROFILE + eval export-credentials) + eksctl.

      Variables:
        CLUSTER     registered EKS cluster name (required — no default; destructive)
        AWS_REGION  region                          default: derived from the context ARN
        GATEWAY     gateway name (default agw)       informational; all Gateways + LB svcs are removed

      Example:
        export AWS_PROFILE=AdministratorAccess-170015905430
        eval "$(aws configure export-credentials --format env)"
        solomog eks:delete CLUSTER=dmorgan-agw
    cmds:
      - bash scripts/run.sh "Delete EKS cluster {{.CLUSTER}}" bash scripts/eks-delete.sh
    env:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default ""}}'
      CONTEXT: '{{.CONTEXT | default ""}}'
      AWS_REGION: '{{.AWS_REGION | default ""}}'
      GATEWAY: '{{.GATEWAY | default ""}}'

  eks:irsa:
    desc: "Give the agentgateway proxy a keyless AWS identity (IRSA) on an EKS CONTEXT — replaces the expiring env-injected creds. Run 'solomog help eks:irsa'."
    summary: |
      Wire the agentgateway proxy ServiceAccount to an IAM role via IRSA (uc05 Trust path A), so
      it signs SigV4 to AgentCore keyless — no more <=12h SSO-cred expiry + rollout dance. Creates
      an IAM invoke policy + web-identity role, annotates the SA, strips the static env creds, and
      restarts the proxy. Idempotent. EKS only (CONTEXT set). Mutates AWS IAM + the proxy.

      Needs aws creds IN THE SHELL (export AWS_PROFILE + eval export-credentials), plus eksctl.

      Variables:
        CONTEXT     external EKS kube context (required)               e.g. arn:aws:eks:...:cluster/dmorgan-agw
        GATEWAY     proxy Deployment name (SA auto-detected)           default agw
        AWS_REGION  region                                             default: derived from the context ARN
        AGENTCORE_RUNTIME_ARN[_2]  runtimes to scope the policy to (from .env; else runtime/* wildcard)

      Example:
        export AWS_PROFILE=AdministratorAccess-170015905430
        eval "$(aws configure export-credentials --format env)"
        solomog eks:irsa CONTEXT=arn:aws:eks:us-east-1:170015905430:cluster/dmorgan-agw
    cmds:
      - bash scripts/run.sh "IRSA for agentgateway proxy" bash scripts/eks-irsa.sh
    env:
      CONTEXT: '{{.CONTEXT | default ""}}'
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
      GATEWAY: '{{.GATEWAY | default ""}}'    # empty → script default (agw)
      AWS_REGION: '{{.AWS_REGION | default ""}}'

  # ─── Sample apps ─────────────────────────────────────────────────────────
  # Deployed to CLUSTER (default cluster-one); context is vcluster-docker_<CLUSTER>.

  apps:bookinfo:
    desc: "Deploy Bookinfo sample app to CLUSTER (default cluster-one)"
    summary: |
      Deploy the Istio Bookinfo sample app to a cluster.

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Deploy Bookinfo → {{.CLUSTER}}" bash scripts/apps/install-bookinfo.sh vcluster-docker_{{.CLUSTER}}

  apps:online-boutique:
    desc: "Deploy Online Boutique sample app to CLUSTER (default cluster-one)"
    summary: |
      Deploy the Online Boutique sample app to a cluster.

      Variables:
        CLUSTER   cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Deploy Online Boutique → {{.CLUSTER}}" helmfile sync -f helmfiles/apps/online-boutique.yaml --kube-context vcluster-docker_{{.CLUSTER}}

  apps:utils:
    desc: "Deploy utils (httpbin, curl, netshoot). Route httpbin with ROUTE=true [ROUTE_PATH=/httpbin]."
    summary: |
      Deploy utility workloads (httpbin, curl, netshoot). httpbin is a plain Service
      backend, so it works on ANY gateway (agw/kgw, auto-detected). With ROUTE=true, adds
      an HTTPRoute for httpbin at ROUTE_PATH (URLRewrite strips the prefix).

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        ROUTE        true | false — route httpbin                       default false
        ROUTE_PATH   path to route httpbin on                           default /httpbin
        GATEWAY      gateway name                                       auto-detected agw/kgw
        GATEWAY_NS   gateway namespace                                  auto-detected

      Run `solomog expose` so routes program. See `solomog help expose`.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Deploy utils (httpbin, curl, netshoot) → {{.CLUSTER}}" bash scripts/apps/install-utils.sh vcluster-docker_{{.CLUSTER}}
    env:
      # TODO: ROUTE (like other dotenv-sourced vars) can stick from .env — if ROUTE=true
      # is ever set there, every apps:* run adds routes without CLI opt-in. TOKEN_EXCHANGE
      # was specially made CLI-only; ROUTE was not. Prefer not putting ROUTE in .env.
      ROUTE: '{{.ROUTE | default "false"}}'
      ROUTE_PATH: '{{.ROUTE_PATH | default "/httpbin"}}'
      GATEWAY: '{{.GATEWAY | default ""}}'
      GATEWAY_NS: '{{.GATEWAY_NS | default ""}}'

  apps:mock-openai:
    desc: "Deploy mock OpenAI server (vLLM sim) to CLUSTER. Add route with ROUTE=true [ROUTE_PATH=/openai]."
    summary: |
      Deploy a mock OpenAI server (vLLM simulator) in its own namespace, with an
      EnterpriseAgentgatewayBackend. agentgateway-only. With ROUTE=true, also adds an
      HTTPRoute at ROUTE_PATH on the gateway.

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        ROUTE        true | false — add the HTTPRoute                   default false
        ROUTE_PATH   path to route on                                   default /openai
        GATEWAY      gateway to route through                          default agw
        APP_NS       workload namespace                                default mock-openai

      Run `solomog expose` so routes program. See `solomog help expose`.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Deploy mock OpenAI (vLLM sim) → {{.CLUSTER}}" bash scripts/apps/install-mock-openai.sh vcluster-docker_{{.CLUSTER}}
    env:
      ROUTE: '{{.ROUTE | default "false"}}'
      ROUTE_PATH: '{{.ROUTE_PATH | default "/openai"}}'
      GATEWAY: '{{.GATEWAY | default ""}}'   # empty → script default agw
      APP_NS: '{{.APP_NS | default ""}}'     # empty → script default mock-openai

  apps:mcp-stripe:
    desc: "Deploy stripe-mock as MCP tools via OpenAPI to CLUSTER. Add route with ROUTE=true [ROUTE_PATH=/mcp]."
    summary: |
      Deploy stripe-mock exposed as MCP tools (via OpenAPI) in the stripe-mock namespace,
      with an EnterpriseAgentgatewayBackend. agentgateway-only. With ROUTE=true, also adds
      an HTTPRoute at ROUTE_PATH on the gateway.

      Variables:
        CLUSTER      cluster name (context vcluster-docker_<CLUSTER>)   default cluster-one
        ROUTE        true | false — add the HTTPRoute                   default false
        ROUTE_PATH   path to route on                                   default /mcp
        GATEWAY      gateway to route through                          default agw

      Run `solomog expose` so routes program. See `solomog help expose`.
    vars:
      CLUSTER: '{{.CLUSTER | default .CLUSTERS | default "cluster-one" | splitList " " | first}}'
    cmds:
      - bash scripts/run.sh "Deploy mock MCP (stripe-mock → OpenAPI) → {{.CLUSTER}}" bash scripts/apps/install-mcp-stripe.sh vcluster-docker_{{.CLUSTER}}
    env:
      ROUTE: '{{.ROUTE | default "false"}}'
      ROUTE_PATH: '{{.ROUTE_PATH | default "/mcp"}}'
      GATEWAY: '{{.GATEWAY | default ""}}'   # empty → script default agw

  # ─── Teardown ─────────────────────────────────────────────────────────────

  teardown:
    desc: "Destroy solomog-created clusters: all, or some via CLUSTER=<name> / CLUSTERS=\"a b\". Prompts first."
    summary: |
      Destroy clusters and clean up. Prompts for confirmation first. With no CLUSTER(S),
      targets only the clusters solomog created (tracked in .solomog/clusters) that still
      exist — hand-made clusters are never touched. An explicit name overrides that.

      Variables:
        CLUSTER    single cluster to destroy
        CLUSTERS   space-separated clusters to destroy (alias of CLUSTER)
                   (omit both → all solomog-created clusters)

      Examples:
        solomog teardown
        solomog teardown CLUSTER=aaa
    vars:
      CLUSTERS: '{{.CLUSTERS | default .CLUSTER | default ""}}'
    cmds:
      - bash scripts/vind-teardown.sh {{.CLUSTERS}}
