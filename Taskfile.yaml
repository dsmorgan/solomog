version: '3'

dotenv: ['.env', 'versions.env']

vars:
  # Override with EDITION=community to use upstream OSS charts (no license key needed)
  EDITION: '{{.EDITION | default "enterprise"}}'

tasks:

  # ─── Meta ─────────────────────────────────────────────────────────────────

  default:
    desc: List all available scenarios
    cmds: [task --list]
    silent: true

  setup:
    desc: Install prerequisites via Homebrew and create the solomog symlink
    cmds: [bash scripts/setup.sh]

  versions:update:
    desc: Fetch latest product versions from GitHub and update versions.env
    cmds: [bash scripts/versions-update.sh]

  versions:show:
    desc: Show currently pinned product versions
    cmds: [cat versions.env]
    silent: true

  # ─── Stack — compose any products on a single cluster ─────────────────────
  # The general-purpose entry point. Installs any combination of products onto
  # one cluster, in dependency order. Single-product tasks below are shortcuts.

  stack:
    desc: 'Compose products on one cluster: PRODUCTS="istio kgateway" CLUSTER=cluster-one'
    vars:
      CLUSTER: '{{.CLUSTER | default "cluster-one"}}'
      PRODUCTS: '{{.PRODUCTS}}'
      ISTIO_MODE: '{{.ISTIO_MODE | default "ambient"}}'
    cmds:
      - bash scripts/stack.sh {{.CLUSTER}} {{.PRODUCTS}}
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: '{{.ISTIO_MODE}}'
    preconditions:
      - sh: '[ -n "{{.PRODUCTS}}" ]'
        msg: 'Specify products, e.g. PRODUCTS="istio kgateway agentgateway"'

  # ─── Istio — single cluster ───────────────────────────────────────────────

  istio:ambient:single:
    desc: "1 cluster · Istio ambient mode · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} istio
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:single:
    desc: "1 cluster · Istio sidecar mode · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} istio
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  gloo-mesh:single:
    desc: "1 cluster · Istio + Gloo Mesh Enterprise mgmt plane · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} istio gloo-mesh
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: '{{.ISTIO_MODE | default "ambient"}}'

  # ─── Istio — multi-cluster mesh ───────────────────────────────────────────
  # mesh.sh installs the istio product module onto each cluster with a shared CA.
  # flat    → clusters share one network; pod routing via networking.sh.
  # gateway → per-cluster network (east-west wiring is a documented TODO).
  # 3-cluster scenarios support mixed Istio versions via versions.env overrides.

  istio:ambient:multi-flat:
    desc: "2 clusters · ambient · flat network · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/mesh.sh flat cluster-one cluster-two
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-flat:
    desc: "2 clusters · sidecar · flat network · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/mesh.sh flat cluster-one cluster-two
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  istio:ambient:multi-gateway:
    desc: "2 clusters · ambient · multi-network (east-west) · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/mesh.sh gateway cluster-one cluster-two
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-gateway:
    desc: "2 clusters · sidecar · multi-network (east-west) · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/mesh.sh gateway cluster-one cluster-two
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  istio:ambient:multi-3:
    desc: "3 clusters · ambient · flat network · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/mesh.sh flat cluster-one cluster-two cluster-three
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: ambient

  istio:sidecar:multi-3:
    desc: "3 clusters · sidecar · flat network · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/mesh.sh flat cluster-one cluster-two cluster-three
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  # ─── kgateway ────────────────────────────────────────────────────────────

  kgateway:
    desc: "1 cluster · kgateway standalone · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} kgateway
    env:
      EDITION: '{{.EDITION}}'

  kgateway:with-istio:
    desc: "1 cluster · kgateway + Istio sidecar · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} istio kgateway
    env:
      EDITION: '{{.EDITION}}'
      ISTIO_MODE: sidecar

  # ─── Gloo Gateway (distinct from kgateway) ────────────────────────────────

  gloo-gateway:
    desc: "1 cluster · Gloo Gateway 1.21.x · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} gloo-gateway
    env:
      EDITION: '{{.EDITION}}'

  # ─── agentgateway ────────────────────────────────────────────────────────

  agentgateway:
    desc: "1 cluster · agentgateway · EDITION={{.EDITION}}"
    cmds:
      - bash scripts/stack.sh {{.CLUSTER | default "cluster-one"}} agentgateway
    env:
      EDITION: '{{.EDITION}}'

  # ─── Sample apps ─────────────────────────────────────────────────────────
  # These operate on the current kubectl context unless CONTEXT is specified.

  apps:bookinfo:
    desc: "Deploy Bookinfo sample app (CONTEXT={{.CONTEXT}})"
    vars:
      CONTEXT: '{{.CONTEXT | default "vcluster-docker_cluster-one"}}'
    cmds:
      - bash scripts/apps/install-bookinfo.sh {{.CONTEXT}}

  apps:online-boutique:
    desc: "Deploy Online Boutique sample app (CONTEXT={{.CONTEXT}})"
    vars:
      CONTEXT: '{{.CONTEXT | default "vcluster-docker_cluster-one"}}'
    cmds:
      - helmfile sync -f helmfiles/apps/online-boutique.yaml --kube-context {{.CONTEXT}}

  apps:utils:
    desc: "Deploy utility pods: httpbin, curl, netshoot (CONTEXT={{.CONTEXT}})"
    vars:
      CONTEXT: '{{.CONTEXT | default "vcluster-docker_cluster-one"}}'
    cmds:
      - helmfile sync -f helmfiles/apps/utils.yaml --kube-context {{.CONTEXT}}

  # ─── Teardown ─────────────────────────────────────────────────────────────

  teardown:
    desc: "Destroy all clusters (prompts for confirmation)"
    cmds: [bash scripts/vind-teardown.sh]

  teardown:cluster:
    desc: "Destroy a specific cluster (CLUSTER=cluster-one)"
    vars:
      CLUSTER: '{{.CLUSTER | default ""}}'
    cmds:
      - bash scripts/vind-teardown.sh {{.CLUSTER}}
    preconditions:
      - sh: '[ -n "{{.CLUSTER}}" ]'
        msg: "Specify a cluster name: CLUSTER=cluster-one"
