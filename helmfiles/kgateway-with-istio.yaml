# kgateway + Istio sidecar on a single cluster.
# Useful for testing kgateway as an ingress with mTLS and Istio policy.
#
# Usage (via solomog):
#   solomog kgateway:with-istio
#   solomog kgateway:with-istio EDITION=community

environments:
  default:
    values:
      - environments/default.yaml
  enterprise:
    values:
      - environments/default.yaml
      - environments/enterprise.yaml
  community:
    values:
      - environments/default.yaml
      - environments/community.yaml

---

repositories:
  - name: istio
    url: "{{ .Values.helm_repo_istio }}"
  - name: cert-manager
    url: "{{ .Values.helm_repo_cert_manager }}"
{{ if eq .Environment.Name "enterprise" }}
  - name: gloo-gateway
    url: "{{ .Values.helm_repo_kgateway }}"
    oci: true
{{ else }}
  - name: kgateway
    url: "{{ .Values.helm_repo_kgateway }}"
    oci: true
{{ end }}

releases:

  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: v1.14.5
    wait: true
    set:
      - name: installCRDs
        value: "true"

  - name: istio-base
    namespace: istio-system
    chart: istio/base
    version: "{{ .Values.istio_version }}"
    wait: true
    needs: [cert-manager/cert-manager]

  - name: istiod
    namespace: istio-system
    chart: istio/istiod
    version: "{{ .Values.istio_version }}"
    wait: true
    needs: [istio-system/istio-base]
    values:
      - ../values/istio/base.yaml
      - ../values/istio/sidecar/values.yaml

  - name: gateway-crds
    namespace: gloo-system
{{ if eq .Environment.Name "enterprise" }}
    chart: gloo-gateway/gloo-gateway-crds
{{ else }}
    chart: kgateway/kgateway-crds
{{ end }}
    version: "{{ .Values.kgateway_version }}"
    wait: true
    needs: [istio-system/istiod]

  - name: kgateway
    namespace: gloo-system
{{ if eq .Environment.Name "enterprise" }}
    chart: gloo-gateway/gloo-gateway
{{ else }}
    chart: kgateway/kgateway
{{ end }}
    version: "{{ .Values.kgateway_version }}"
    wait: true
    needs: [gloo-system/gateway-crds]
    values:
      - ../values/kgateway/values.yaml
{{ if eq .Environment.Name "enterprise" }}
      - license:
          key: "{{ .Values.license_key }}"
{{ end }}
