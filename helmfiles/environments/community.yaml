# Community / open-source edition overrides.
# No license key required. Uses upstream / public chart repos.

# kgateway community (upstream Kubernetes Gateway API implementation)
# https://github.com/kgateway-dev/kgateway
helm_repo_kgateway: "oci://ghcr.io/kgateway-dev/charts"

# Gloo Gateway open source (1.21.x) — classic Helm repo.
# Chart: gloo/gloo. Namespace: gloo-system.
# https://docs.solo.io/gateway/1.21.x/quickstart/
helm_repo_gloo_gateway: "https://storage.googleapis.com/solo-public-helm"

# agentgateway community
# https://github.com/agentgateway/agentgateway
helm_repo_agentgateway: "oci://ghcr.io/agentgateway/charts"
