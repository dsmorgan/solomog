# Solo enterprise edition overrides.
# Sets chart repos to Solo's OCI/Helm registries.
#
# License keys are resolved per-product in default.yaml from .env.

# Gloo Operator — installs Solo's managed Istio (enterprise istio path).
# Charts: gloo-operator. Namespace: gloo-mesh. License: manager.env.SOLO_ISTIO_LICENSE_KEY.
# Verified: https://docs.solo.io/istio/1.30.x/quickstart/multi/
helm_repo_gloo_operator: "oci://us-docker.pkg.dev/solo-public/gloo-operator-helm"

# Gloo Mesh Enterprise management plane + agent (optional product).
# TODO: verify against https://docs.solo.io/gloo-mesh-enterprise/latest/setup/installation/
helm_repo_gloo_mesh: "https://storage.googleapis.com/gloo-mesh-enterprise/gloo-mesh-enterprise"

# Enterprise kgateway (kgateway 2.2.x) — OCI registry.
# Charts: enterprise-kgateway-crds, enterprise-kgateway. Namespace: kgateway-system.
# Verified: https://docs.solo.io/kgateway/2.2.x/install/helm/
helm_repo_kgateway: "oci://us-docker.pkg.dev/solo-public/enterprise-kgateway/charts"

# Gloo Gateway Enterprise (1.21.x) — classic Helm repo.
# Chart: glooe/gloo-ee. Namespace: gloo-system.
# Verified: https://docs.solo.io/gateway/1.21.x/quickstart/
helm_repo_gloo_gateway: "https://storage.googleapis.com/gloo-ee-helm"

# Enterprise agentgateway (2.3.x) — OCI registry.
# Charts: enterprise-agentgateway-crds, enterprise-agentgateway. Namespace: agentgateway-system.
# Verified: https://docs.solo.io/agentgateway/2.3.x/install/helm/
helm_repo_agentgateway: "oci://us-docker.pkg.dev/solo-public/enterprise-agentgateway/charts"
