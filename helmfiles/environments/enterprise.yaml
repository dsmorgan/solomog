# Solo enterprise edition overrides.
# Sets chart repos to Solo's OCI/Helm registries.
#
# License keys are resolved per-product in default.yaml (gloo_mesh_license_key,
# gloo_gateway_license_key, agentgateway_license_key) from .env.
# TODO: verify the exact OCI paths against your product version release notes.

# Gloo Mesh Enterprise management plane + agent
# Verify at: https://docs.solo.io/gloo-mesh-enterprise/latest/setup/installation/
helm_repo_gloo_mesh: "https://storage.googleapis.com/gloo-mesh-enterprise/gloo-mesh-enterprise"

# Gloo Gateway (Enterprise kgateway)
# Verify at: https://docs.solo.io/gateway/latest/setup/
helm_repo_kgateway: "oci://us-docker.pkg.dev/gloo-mesh/release"

# Agent Gateway Enterprise
# Verify at: https://docs.solo.io/agent-gateway/
helm_repo_agentgateway: "oci://us-docker.pkg.dev/solo-public/helm"
