# agentgateway on a single cluster.
# enterprise: Solo enterprise agentgateway
# community:  upstream agentgateway
#
# Usage (via solomog):
#   solomog agentgateway
#   solomog agentgateway EDITION=community
#
# TODO: verify chart names and repo URLs against the agentgateway release notes:
#   https://docs.solo.io/agent-gateway/

environments:
  default:
    values:
      - environments/default.yaml
  enterprise:
    values:
      - environments/default.yaml
      - environments/enterprise.yaml
  community:
    values:
      - environments/default.yaml
      - environments/community.yaml

---

repositories:
  - name: agentgateway
    url: "{{ .Values.helm_repo_agentgateway }}"
    oci: true

releases:

  - name: agentgateway
    namespace: agentgateway
    chart: agentgateway/agentgateway
    version: "{{ .Values.agentgateway_version }}"
    wait: true
    values:
      - ../values/agentgateway/values.yaml
{{ if eq .Environment.Name "enterprise" }}
      - license:
          key: "{{ .Values.license_key }}"
{{ end }}
