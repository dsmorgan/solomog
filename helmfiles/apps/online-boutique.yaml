# Online Boutique (Google's microservices demo app).
# Deployed via the official Helm chart.
# https://github.com/GoogleCloudPlatform/microservices-demo
#
# Usage (via solomog):
#   solomog apps:online-boutique
#   solomog apps:online-boutique CONTEXT=vcluster.cluster-two

repositories:
  - name: online-boutique
    # scheme-less — helmfile prepends oci:// when oci: true
    url: us-docker.pkg.dev/google-samples/charts
    oci: true

releases:
  - name: online-boutique
    namespace: online-boutique
    chart: online-boutique/onlineboutique
    wait: true
    values:
      - ../../values/apps/online-boutique.yaml
