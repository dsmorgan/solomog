# Product module: kgateway (community) / Gloo Gateway (enterprise), single cluster.
# License: gloo_gateway_license_key (GLOO_GATEWAY_LICENSE_KEY or SOLO_LICENSE_KEY).
#
# Composed via: solomog stack CLUSTER=... PRODUCTS="kgateway"
#
# TODO: verify chart names / repo URLs against your installed version:
#   Enterprise: https://docs.solo.io/gateway/latest/setup/
#   Community:  https://kgateway.dev/docs/quickstart/

bases:
  - ../commons.yaml

---

repositories:
{{ if eq .Environment.Name "enterprise" }}
  - name: gloo-gateway
    url: "{{ .Values.helm_repo_kgateway }}"
    oci: true
{{ else }}
  - name: kgateway
    url: "{{ .Values.helm_repo_kgateway }}"
    oci: true
{{ end }}

releases:
  - name: gateway-crds
    namespace: gloo-system
{{ if eq .Environment.Name "enterprise" }}
    chart: gloo-gateway/gloo-gateway-crds
{{ else }}
    chart: kgateway/kgateway-crds
{{ end }}
    version: "{{ .Values.kgateway_version }}"
    wait: true

  - name: kgateway
    namespace: gloo-system
{{ if eq .Environment.Name "enterprise" }}
    chart: gloo-gateway/gloo-gateway
{{ else }}
    chart: kgateway/kgateway
{{ end }}
    version: "{{ .Values.kgateway_version }}"
    wait: true
    needs:
      - gloo-system/gateway-crds
    values:
      - ../../values/kgateway/values.yaml
{{ if eq .Environment.Name "enterprise" }}
      - license:
          key: "{{ .Values.gloo_gateway_license_key }}"
{{ end }}
